<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dollar Tree ASM Assistant</title>


    <style>

        /* ===============================
           GLOBAL APP STYLES
        =============================== */

        body {

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                sans-serif;

            background-color: #f4f7f6;

            color: #333;

            margin: 0;

            padding: 15px;

            display: flex;

            justify-content: center;

        }


        /* ===============================
           MAIN APP CONTAINER
        =============================== */

        .app-container {

            width: 100%;

            max-width: 480px;

            background: white;

            padding: 20px;

            border-radius: 12px;

            box-shadow:
                0 4px 10px rgba(0,0,0,0.05);

        }


        h1 {

            color: #007a48;

            font-size: 20px;

            text-align: center;

            margin-top: 0;

        }



        /* ===============================
           NAVIGATION MENU
        =============================== */

        .menu-grid {

            display: grid;

            grid-template-columns: 1fr;

            gap: 10px;

            margin-bottom: 20px;

        }


        button {

            background-color: #007a48;

            color: white;

            border: none;

            padding: 12px;

            border-radius: 6px;

            font-size: 14px;

            font-weight: bold;

            cursor: pointer;

            text-align: left;

        }


        button:active {

            background-color: #005432;

        }



        /* ===============================
           ACTIVE SCREEN DISPLAY
        =============================== */

        .screen-box {

            background:white;

            border:1px solid #ddd;

            border-radius:8px;

            padding:15px;

            margin-bottom:15px;

        }


        .dashboard-card {

            background:#f7f7f7;

            padding:12px;

            border-radius:6px;

            margin-top:10px;

        }



        /* ===============================
           TOOL CONSOLE
        =============================== */

        .console-box {

            background:#1e1e1e;

            color:#39ff14;

            font-family:
                "Courier New",
                Courier,
                monospace;

            padding:15px;

            border-radius:8px;

            min-height:200px;

            white-space:pre-wrap;

            font-size:13px;

            box-shadow:
                inset 0 2px 5px rgba(0,0,0,0.5);

            line-height:1.4;

        }



        /* ===============================
           INPUT AREA
        =============================== */

        .input-area {

            display:flex;

            gap:5px;

            margin-top:10px;

        }


        input {

            flex:1;

            padding:10px;

            border:1px solid #ccc;

            border-radius:4px;

            font-size:14px;

            background:#fff;

            color:#000;

        }


        .send-btn {

            background-color:#333;

            width:auto;

            padding:0 15px;

            text-align:center;

        }


    </style>

</head>



<body>


<div class="app-container">


    <!-- ===============================
         APPLICATION TITLE
    =============================== -->


    <h1>
        🌳 Dollar Tree ASM Assistant (#6228)
    </h1>




    <!-- ===============================
         MAIN NAVIGATION
    =============================== -->


    <div class="menu-grid">


        <button onclick="showScreen('dashboard')">

            🏠 Dashboard

        </button>



        <button onclick="showScreen('opening')">

            🌅 Opening Checklist

        </button>



        <button onclick="showScreen('closing')">

            🌙 Closing Checklist

        </button>



        <button onclick="showScreen('tasks')">

            ✅ Daily Tasks

        </button>



        <button onclick="showScreen('notes')">

            📝 Daily Notes

        </button>



        <button onclick="showScreen('tools')">

            🧰 ASM Tools

        </button>


    </div>





    <!-- ===============================
         ACTIVE APPLICATION SCREEN
    =============================== -->


    <hr>


    <div id="screen" class="screen-box">


        <h2>
            🏠 Dashboard
        </h2>


        <p>
            Welcome to Dollar Tree ASM OS
        </p>



        <div class="dashboard-card">


            <strong>
                Store #6228
            </strong>


            <br>


            Status:
            Ready


        </div>


    </div>





    <!-- ===============================
         TOOL TERMINAL
    =============================== -->


    <div class="console-box" id="terminal">

        System Ready. Select an operational module above.

    </div>





    <!-- ===============================
         TOOL INPUT
    =============================== -->


    <div class="input-area">


        <input
            type="text"
            id="user-input"
            placeholder="Type parameters here..."
            onkeypress="handleKey(event)"
        >



        <button
            class="send-btn"
            onclick="sendInput()"
        >

            Submit

        </button>


    </div>


</div>
    </div>

</div>

<script>

/* ==========================================================
   DOLLAR TREE ASM ASSISTANT
   Store #6228
   Version 0.2
========================================================== */


/* ==========================================================
   STORE DATA
========================================================== */

const STORE_MAP = {

    hbc: [

        "shampoo",

        "oral care",

    ],

    ],

    grocery: [

        "canned goods",
        "candy",
        "peg bag chocolate",

        "drinks",

    ],

    party: [

        "balloons",
        "gift bags",
        "plates",
        "streamers",
        "cards",
        "ribbon",
        "tablecloths",
        "bows",
        "catering",
        "invitations"

    ],

    variety: [

        "kitchenware",
        "textiles",
        "home decor",
        "books",
        "apparel",
        "stationery",
        "craft supplies",
        "hardware",

        "automotive"

    ],

    seasonal: [

        "toys",
        "lawn and garden",
        "floral",
        "electronics",
        "batteries",
        "halloween",
        "christmas",
        "easter",
        "summer toys",
        "back to school"

    ],

    pet_supplies: [

        "dog food",
        "cat food",
        "pet treats",
        "pet toys",
        "leashes",
        "bowls"

    ]

};


/* ==========================================================
   APPLICATION STATE
========================================================== */

let activeMode = "MENU";

let currentScreen = "dashboard";
    /* ==========================================================
   ASM OPERATING STATE
========================================================== */


const ASM_STATE = {


    store: {

        number: "6228",

        location: "6228 E Broadway Blvd",

        city: "Tucson",

        state: "AZ"

    },


    shift: {

        role: "Assistant Store Manager",

        currentShift: "Not Set",

        managerOnDuty: "Not Set"

    },


    daily: {

        date: new Date().toLocaleDateString(),

        openingComplete: false,

        closingComplete: false,

        truckProcessed: false,

        recoveryComplete: false

    },


tasks: [

    {
        id: 1,
        name: "Complete daily sales floor walk",
        priority: "HIGH",
        complete: false
    },


    {
        id: 2,
        name: "Check recovery conditions",
        priority: "MEDIUM",
        complete: false
    },


    {
        id: 3,
        name: "Review backstock priorities",
        priority: "LOW",
        complete: false
    }

],


notes: [],


alerts: [],


openingChecklist: [

    {
        id: 1,
        task: "Disable alarm / verify store access",
        complete: false
    },


    {
        id: 2,
        task: "Verify cash office and register readiness",
        complete: false
    },


    {
        id: 3,
        task: "Check sales floor recovery condition",
        complete: false
    },


    {
        id: 4,
        task: "Walk aisles for safety hazards",
        complete: false
    },


    {
        id: 5,
        task: "Check restroom condition",
        complete: false
    },


    {
        id: 6,
        task: "Review truck/freight priorities",
        complete: false
    }


]

    ,


closingChecklist: [

    {
        id: 1,
        task: "Complete final sales floor recovery",
        complete: false
    },


    {
        id: 2,
        task: "Verify front end/register area is clean",
        complete: false
    },


    {
        id: 3,
        task: "Check fitting/restroom areas",
        complete: false
    },


    {
        id: 4,
        task: "Complete closing safety walk",
        complete: false
    },


    {
        id: 5,
        task: "Verify cash office procedures completed",
        complete: false
    },


    {
        id: 6,
        task: "Prepare manager handoff notes",
        complete: false
    }

]

};
    
/* ==========================================================
   SCREEN TEMPLATES
========================================================== */

/* ==========================================================
   SCREEN RENDER FUNCTIONS
========================================================== */


function renderDashboard(){


    return `


        <h2>
            🏠 ASM Dashboard
        </h2>



        <div class="dashboard-card">


            <strong>
                Store #${ASM_STATE.store.number}
            </strong>


            <br>


            ${ASM_STATE.store.location}


            <br><br>


            Role:
            ${ASM_STATE.shift.role}


        </div>




        <div class="dashboard-card">


            📅 Date:

            ${ASM_STATE.daily.date}


        </div>




        <div class="dashboard-card">


            🚚 Truck Status:

            ${
                ASM_STATE.daily.truckProcessed
                ? "✅ Complete"
                : "⏳ Pending"
            }


            <br>


            🧹 Recovery:

            ${
                ASM_STATE.daily.recoveryComplete
                ? "✅ Complete"
                : "⏳ Pending"
            }


        </div>




        <div class="dashboard-card">


            🚨 Alerts:

            ${
                ASM_STATE.alerts.length
                ? ASM_STATE.alerts.join("<br>")
                : "No alerts"

            }


        </div>


    `;


}





function renderOpening(){


    let checklistHTML = "";



    ASM_STATE.openingChecklist.forEach(item => {


        checklistHTML += `

            <div class="dashboard-card">


                <input
                    type="checkbox"
                    ${
                        item.complete
                        ? "checked"
                        : ""
                    }

                    onclick="toggleOpeningTask(${item.id})"
                >


                ${item.task}


            </div>


        `;


    });




    return `


        <h2>
            🌅 Opening Checklist
        </h2>


        <p>
            Complete opening procedures.
        </p>


        ${checklistHTML}



        <div class="dashboard-card">


            Status:

            ${
                ASM_STATE.daily.openingComplete
                ? "✅ Opening Complete"
                : "⏳ In Progress"
            }


        </div>


    `;


}





function renderClosing(){


    let checklistHTML = "";



    ASM_STATE.closingChecklist.forEach(item => {


        checklistHTML += `

            <div class="dashboard-card">


                <input
                    type="checkbox"

                    ${
                        item.complete
                        ? "checked"
                        : ""
                    }


                    onclick="toggleClosingTask(${item.id})"
                >


                ${item.task}


            </div>


        `;


    });




    return `


        <h2>
            🌙 Closing Checklist
        </h2>


        <p>
            Complete closing procedures.
        </p>


        ${checklistHTML}



        <div class="dashboard-card">


            Status:

            ${
                ASM_STATE.daily.closingComplete
                ? "✅ Closing Complete"
                : "⏳ In Progress"
            }


        </div>


    `;


}





function renderTasks(){


    let taskHTML = "";



    ASM_STATE.tasks.forEach(task => {



        taskHTML += `


        <div class="dashboard-card">


            <input

                type="checkbox"

                ${
                    task.complete
                    ? "checked"
                    : ""

                }


                onclick="toggleTask(${task.id})"

            >



            <strong>

            ${task.priority}

            </strong>


            <br>


            ${task.name}



        </div>


        `;


    });




    return `


        <h2>
            ✅ Daily Tasks
        </h2>



        <p>
            Manage today's ASM priorities.
        </p>



        ${taskHTML}



        <div class="dashboard-card">


            Completed:

            ${
                ASM_STATE.tasks.filter(
                    task => task.complete
                ).length

            }


            /

            ${ASM_STATE.tasks.length}



        </div>


    `;


}





function renderNotes(){

    return `

        <h2>
            📝 Daily Notes
        </h2>


        <p>
            Notes system coming next.
        </p>


    `;

}





function renderTools(){

    return `

        <h2>
            🧰 ASM Tools
        </h2>


        <p>
            Operational tools loading soon.
        </p>


    `;

}
    /* ==========================================================
   SCREEN NAVIGATION
========================================================== */

/* ==========================================================
   SCREEN CONTROLLER
========================================================== */


function showScreen(screen){

    currentScreen = screen;


    const screenArea =
        document.getElementById("screen");


    if(!screenArea){
        return;
    }



    switch(screen){


        case "dashboard":

            screenArea.innerHTML =
                renderDashboard();

            break;



        case "opening":

            screenArea.innerHTML =
                renderOpening();

            break;



        case "closing":

            screenArea.innerHTML =
                renderClosing();

            break;



        case "tasks":

            screenArea.innerHTML =
                renderTasks();

            break;



        case "notes":

            screenArea.innerHTML =
                renderNotes();

            break;



        case "tools":

            screenArea.innerHTML =
                renderTools();

            break;



        default:

            screenArea.innerHTML =
            `
                <h2>
                    Screen Not Found
                </h2>
            `;

    }

}


/* ==========================================================
   OPENING CHECKLIST CONTROLLER
========================================================== */


function toggleOpeningTask(id){


    const task =
        ASM_STATE.openingChecklist.find(
            item => item.id === id
        );



    if(task){

        task.complete =
            !task.complete;

    }



    const allComplete =
        ASM_STATE.openingChecklist.every(
            item => item.complete
        );



    ASM_STATE.daily.openingComplete =
        allComplete;



    showScreen("opening");

}
/* ==========================================================
   CLOSING CHECKLIST CONTROLLER
========================================================== */


function toggleClosingTask(id){


    const task =
        ASM_STATE.closingChecklist.find(
            item => item.id === id
        );



    if(task){

        task.complete =
            !task.complete;

    }



    const allComplete =
        ASM_STATE.closingChecklist.every(
            item => item.complete
        );



    ASM_STATE.daily.closingComplete =
        allComplete;



    showScreen("closing");

}
/* ==========================================================
   DAILY TASK CONTROLLER
========================================================== */


function toggleTask(id){


    const task =
        ASM_STATE.tasks.find(
            item => item.id === id
        );



    if(task){


        task.complete =
            !task.complete;


    }



    showScreen("tasks");


}


/* ==========================================================
   APPLICATION STARTUP
========================================================== */

showScreen("dashboard");
</script>

</body>
</html>
