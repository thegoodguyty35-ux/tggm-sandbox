<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dollar Tree ASM Assistant</title>
    <link rel="stylesheet" href="https://pyscript.net" />
    <script type="module" src="https://pyscript.net"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #007a48; font-size: 20px; text-align: center; margin-top: 0; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        button { background-color: #007a48; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; text-align: left; }
        button:active { background-color: #005432; }
        .console-box { background: #1e1e1e; color: #39ff14; font-family: "Courier New", Courier, monospace; padding: 15px; border-radius: 8px; min-height: 200px; white-space: pre-wrap; font-size: 13px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); line-height: 1.4; }
        .input-area { display: flex; gap: 5px; margin-top: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background: #fff; color: #000; }
        .send-btn { background-color: #333; width: auto; padding: 0 15px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🌳 Dollar Tree ASM Assistant (#6228)</h1>
    <div class="menu-grid">
        <button onclick="runModule('1', '🔍 [AISLE FINDER]\nEnter target product keywords (shampoo, bleach, snacks):')">1. Aisle Map / Go-Back Finder</button>
        <button onclick="runModule('2', '🧮 [TILL CALCULATOR]\nEnter parameters as \'Proximity,ShiftPattern\' (e.g. 1,3):')">2. Compute Register Till ID</button>
        <button onclick="runModule('3', '💵 [CASH DROP MONITOR]\nEnter counts as \'1s,5s,10s,20s\' (e.g. 30,12,5,15):')">3. Monitor Till Pickups ($400 Cap)</button>
        <button onclick="runModule('4', '🚨 [VOID AUDITING]\nEnter values as \'LineVoids,CustomerCount\' (e.g. 4,145):')">4. Audit Line Voids (3% Limit)</button>
        <button onclick="runModule('5', '📈 [DAILY REVENUE TARGET]\nEnter tonight\'s total net terminal report sales amount ($):')">5. Check Daily Sales Pace ($3M Goal)</button>
        <button onclick="runModule('7', 'Console buffer cleared. Ready for next operational command directive.')">6. Clear Console Screen</button>
    </div>
    <div class="console-box" id="terminal">System online. Select an option above.</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type parameters here..." onkeypress="handleKey(event)">
        <button class="send-btn" onclick="sendInput()">Submit</button>
    </div>
</div>

<script type="py">
import js

STORE_MAP = {
    "hbc": ["shampoo", "conditioner", "body wash", "toothpaste", "oral care", "deodorant", "soap", "lotion", "medicine", "eyewear", "makeup", "bandages"],
    "chemical": ["bleach", "sprays", "dish soap", "sponges", "trash bags", "laundry detergent", "wipes", "brooms", "mops", "foil", "tissues"],
    "grocery": ["canned goods", "candy", "peg bag chocolate", "snacks", "drinks", "chips", "cookies", "juice", "soda", "bread", "cereal", "condiments"],
    "party": ["balloons", "gift bags", "plates", "streamers", "cards", "ribbon", "tablecloths", "bows", "catering", "invitations"],
    "variety": ["kitchenware", "textiles", "home decor", "books", "apparel", "stationery", "craft supplies", "hardware", "tools", "automotive"],
    "seasonal": ["toys", "lawn and garden", "floral", "electronics", "batteries", "halloween", "christmas", "easter", "summer toys", "back to school"],
    "pet_supplies": ["dog food", "cat food", "pet treats", "pet toys", "leashes", "bowls"]
}

def process_logic(mode, entry):
    clean = entry.strip().lower()
    if not clean: return "❌ Input cannot be blank."
    
    if mode == "1":
        for sec, items in STORE_MAP.items():
            if clean in sec or any(item in clean or clean in item for item in items):
                return f"✅ CATEGORY MATCH:\nSector: {sec.upper()}\nItems: {', '.join(items)}"
        return f"⚠️ '{entry}' not indexed. Match perimeter panel markings."
        
    elif mode == "2":
        try:
            parts = [p.strip() for p in clean.split(",") if p.strip()]
            if len(parts) != 2: raise ValueError
            return f"🎯 TILL IDENTIFIER MATCH:\nAssign Till ID String: {(int(parts[0]) * 10) + int(parts[1])}\n\nRule: Continuous login flow balance operational state."
        except:
            return "❌ Format Error. Use: Proximity,Pattern (Example: 1,3)"
            
    elif mode == "3":
        try:
            parts = [int(p.strip()) for p in clean.split(",") if p.strip()]
            if len(parts) != 4: raise ValueError
            tot = (parts[0]*1) + (parts[1]*5) + (parts[2]*10) + (parts[3]*20)
            if tot >= 400.00:
                return f"🚨 DROP ALARM: ${tot:.2f}\nAction: Pull ${tot - 75.00:.2f} right now.\nLeave safe balance of $75.00 in drawer."
            return f"✅ COMPLIANT: Total ${tot:.2f}.\nDrawer variance holds ${400.00 - tot:.2f} of safety headroom."
        except:
            return "❌ Format Error. Use bill sequence: 1s,5s,10s,20s (Example: 20,10,5,8)"
            
    elif mode == "4":
        try:
            parts = [int(p.strip()) for p in clean.split(",") if p.strip()]
            if len(parts) != 2: raise ValueError
            voids, cc = parts[0], parts[1]
            if cc <= 0: return "❌ Safeguard: Transactions must be 1 or higher."
            rate = (voids / cc) * 100.0
            status = "🚨 EXCEEDS 3% POLICY!" if rate >= 3.0 else "✅ COMPLIANT TRANSACTION RATIO"
            return f"📊 VOID METRIC AUDIT:\nRatio: {rate:.2f}%\nStatus: {status}"
        except:
            return "❌ Format Error. Enter values: Voids,Transactions (Example: 5,160)"
            
    elif mode == "5":
        try:
            sales = float(clean)
            target = 3000000.00 / 365.0
            diff = sales - target
            perf = f"🎉 Ahead of baseline target by +${diff:.2f}" if diff >= 0 else f"📉 Lagging baseline target by -${abs(diff):.2f}"
            return f"📈 REVENUE MATRIX (Store #6228):\nTarget Daily Pace: ${target:.2f}\nActual Revenue: ${sales:.2f}\nPerformance: {perf}"
        except:
            return "❌ Format Error. Enter raw numeric sales value (Example: 8450.25)"
    return "Select a panel button module layout option above."

def gateway(mode, user_entry):
    out = process_logic(mode, user_entry)
    js.document.getElementById("terminal").innerText = str(out)

js.window.pipeInputToPython = gateway
</script>

<script>
    let activeMode = "MENU";
    function runModule(mode, promptText) {
        const term = document.getElementById("terminal");
        const inp = document.getElementById("user-input");
        inp.value = "";
        activeMode = mode;
        term.innerText = promptText;
        if(mode === '7') {
            term.innerText = "Console buffer cleared. Ready for next operational command directive.";
            activeMode = "MENU";
        }
        inp.focus();
    }
    function sendInput() {
        const inp = document.getElementById("user-input");
        if (!inp.value.trim()) return;
        window.pipeInputToPython(activeMode, inp.value);
        inp.value = "";
    }
    function handleKey(e) { if (e.key === 'Enter') sendInput(); }
</script>
</body>
</html>
