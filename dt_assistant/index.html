function createProgressBar(current,total){


    let percent = 0;


    if(total > 0){

        percent =
        Math.round(
            (current / total) * 100
        );

    }



    return `


        <div class="progress-container">


            <div

                class="progress-bar"

                style="width:${percent}%"

            >

            </div>


        </div>



        <small>

            ${percent}% Complete

        </small>


    `;


}

   LOCAL STORAGE SYSTEM
========================================================== */


function saveASMState(){


    localStorage.setItem(

        "DT_ASM_STATE",

        JSON.stringify(
            ASM_STATE
        )

    );


}

function loadASMState(){


    const savedState =
        localStorage.getItem(
            "DT_ASM_STATE"
        );



    if(savedState){


        const parsedState =
            JSON.parse(savedState);



        Object.assign(
            ASM_STATE,
            parsedState
        );


    }


}

function renderDashboard(){


    const openingTotal =
        ASM_STATE.openingChecklist.length;


    const openingComplete =
        ASM_STATE.openingChecklist.filter(
            item => item.complete
        ).length;



    const closingTotal =
        ASM_STATE.closingChecklist.length;


    const closingComplete =
        ASM_STATE.closingChecklist.filter(
            item => item.complete
        ).length;



    const taskTotal =
        ASM_STATE.tasks.length;


    const taskComplete =
        ASM_STATE.tasks.filter(
            task => task.complete
        ).length;



    const notesTotal =
        ASM_STATE.notes.length;



    const readinessScore = Math.round(

        (

            (openingComplete / openingTotal) * 40

            +

            (closingComplete / closingTotal) * 20

            +

            (taskComplete / taskTotal) * 30

            +

            (notesTotal > 0 ? 10 : 0)

        )

    );



    let status =
        "🟡 Needs Attention";



    if(readinessScore >= 80){

        status =
        "🟢 Operational";

    }



    if(readinessScore >= 95){

        status =
        "⭐ Excellent";

    }



    return `


        <div class="dashboard-card">


            <strong>
                🌅 Opening Checklist
            </strong>



            ${createProgressBar(
                openingComplete,
                openingTotal
            )}



            <br>


            ${openingComplete}

            ${openingTotal}

                taskTotal

            <strong>

            </strong>


            <br><br>


            ${readinessScore}%


            <br><br>


            Status:

    `;


}

========================================================== */


function showScreen(screen){

    currentScreen = screen;


    const screenArea =
        document.getElementById("screen");


    if(!screenArea){
        return;
    }



    switch(screen){


        case "dashboard":

            screenArea.innerHTML =
                renderDashboard();

            break;



        case "opening":

            screenArea.innerHTML =
                renderOpening();

            break;



        case "closing":

            screenArea.innerHTML =
                renderClosing();

            break;



        case "tasks":

            screenArea.innerHTML =
                renderTasks();

            break;



        case "notes":

            screenArea.innerHTML =
                renderNotes();

            break;



        case "tools":

            screenArea.innerHTML =
                renderTools();

            break;

            
        case "handoff":

            screenArea.innerHTML =
                renderHandoff();

            break;

            
        case "incidents":

            screenArea.innerHTML =
                renderIncidents();

            break;



        default:

            screenArea.innerHTML =
            `
                <h2>
                    Screen Not Found
                </h2>
            `;

    }

}
    
function addHandoff(event){


    event.preventDefault();



    const message =
        document.getElementById(
            "handoff-message"
        ).value;



    const category =
        document.getElementById(
            "handoff-category"
        ).value;



    if(!message.trim()){

        return;

    }



    ASM_STATE.handoffs.push({


        id:
        Date.now(),


        category:
        category,


        message:
        message,


        created:
        new Date().toLocaleString()


    });



    saveASMState();



    showScreen("handoff");


}


/* ==========================================================
   OPENING CHECKLIST CONTROLLER
========================================================== */


function toggleOpeningTask(id){


    const task =
        ASM_STATE.openingChecklist.find(
            item => item.id === id
        );



    if(task){

        task.complete =
            !task.complete;

    }



    const allComplete =
        ASM_STATE.openingChecklist.every(
            item => item.complete
        );



    ASM_STATE.daily.openingComplete =
        allComplete;



    saveASMState();



    showScreen("opening");

}
/* ==========================================================
   CLOSING CHECKLIST CONTROLLER
========================================================== */


function toggleClosingTask(id){


    const task =
        ASM_STATE.closingChecklist.find(
            item => item.id === id
        );



    if(task){

        task.complete =
            !task.complete;

    }



    const allComplete =
        ASM_STATE.closingChecklist.every(
            item => item.complete
        );



    ASM_STATE.daily.closingComplete =
        allComplete;

    saveASMState();

    showScreen("closing");

}
/* ==========================================================
   DAILY TASK CONTROLLER
========================================================== */


function toggleTask(id){


    const task =
        ASM_STATE.tasks.find(
            item => item.id === id
        );



    if(task){


        task.complete =
            !task.complete;



        if(task.complete){

            task.completedAt =
                new Date().toLocaleString();

        }

        else{

            task.completedAt =
                null;

        }

    }



    saveASMState();


    showScreen("tasks");

function addTask(event){


    event.preventDefault();



    const name =
        document.getElementById(
            "new-task-name"
        ).value;



    const priority =
        document.getElementById(
            "new-task-priority"
        ).value;



    if(!name.trim()){

        return;

    }



    const newTask = {


        id:
        Date.now(),


        name:
        name,


        priority:
        priority,


        complete:false,


        created:
        new Date().toLocaleString(),


        completedAt:null


    };



    ASM_STATE.tasks.push(newTask);

    saveASMState();

    showScreen("tasks");


}
