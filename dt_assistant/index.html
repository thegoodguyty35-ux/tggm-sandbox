<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dollar Tree ASM Assistant</title>


    <style>

        /* ===============================
           GLOBAL APP STYLES
        =============================== */

        body {

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                sans-serif;

            background-color: #f4f7f6;

            color: #333;

            margin: 0;

            padding: 15px;

            display: flex;

            justify-content: center;

        }


        /* ===============================
           MAIN APP CONTAINER
        =============================== */

        .app-container {

            width: 100%;

            max-width: 480px;

            background: white;

            padding: 20px;

            border-radius: 12px;

            box-shadow:
                0 4px 10px rgba(0,0,0,0.05);

        }


        h1 {

            color: #007a48;

            font-size: 20px;

            text-align: center;

            margin-top: 0;

        }



        /* ===============================
           NAVIGATION MENU
        =============================== */

        .menu-grid {

            display: grid;

            grid-template-columns: 1fr;

            gap: 10px;

            margin-bottom: 20px;

        }


        button {

            background-color: #007a48;

            color: white;

            border: none;

            padding: 12px;

            border-radius: 6px;

            font-size: 14px;

            font-weight: bold;

            cursor: pointer;

            text-align: left;

        }


        button:active {

            background-color: #005432;

        }



        /* ===============================
           ACTIVE SCREEN DISPLAY
        =============================== */

        .screen-box {

            background:white;

            border:1px solid #ddd;

            border-radius:8px;

            padding:15px;

            margin-bottom:15px;

        }


        .dashboard-card {

            background:#f7f7f7;

            padding:12px;

            border-radius:6px;

            margin-top:10px;

        }



        /* ===============================
           TOOL CONSOLE
        =============================== */

        .console-box {

            background:#1e1e1e;

            color:#39ff14;

            font-family:
                "Courier New",
                Courier,
                monospace;

            padding:15px;

            border-radius:8px;

            min-height:200px;

            white-space:pre-wrap;

            font-size:13px;

            box-shadow:
                inset 0 2px 5px rgba(0,0,0,0.5);

            line-height:1.4;

        }



        /* ===============================
           INPUT AREA
        =============================== */

        .input-area {

            display:flex;

            gap:5px;

            margin-top:10px;

        }


        input {

            flex:1;

            padding:10px;

            border:1px solid #ccc;

            border-radius:4px;

            font-size:14px;

            background:#fff;

            color:#000;

        }


        .send-btn {

            background-color:#333;

            width:auto;

            padding:0 15px;

            text-align:center;

        }


    </style>

</head>



<body>


<div class="app-container">


    <!-- ===============================
         APPLICATION TITLE
    =============================== -->


    <h1>
        🌳 Dollar Tree ASM Assistant (#6228)
    </h1>




    <!-- ===============================
         MAIN NAVIGATION
    =============================== -->


    <div class="menu-grid">


        <button onclick="showScreen('dashboard')">

            🏠 Dashboard

        </button>



        <button onclick="showScreen('opening')">

            🌅 Opening Checklist

        </button>



        <button onclick="showScreen('closing')">

            🌙 Closing Checklist

        </button>



        <button onclick="showScreen('tasks')">

            ✅ Daily Tasks

        </button>



        <button onclick="showScreen('notes')">

            📝 Daily Notes

        </button>



        <button onclick="showScreen('tools')">

            🧰 ASM Tools

        </button>


    </div>





    <!-- ===============================
         ACTIVE APPLICATION SCREEN
    =============================== -->


    <hr>


    <div id="screen" class="screen-box">


        <h2>
            🏠 Dashboard
        </h2>


        <p>
            Welcome to Dollar Tree ASM OS
        </p>



        <div class="dashboard-card">


            <strong>
                Store #6228
            </strong>


            <br>


            Status:
            Ready


        </div>


    </div>





    <!-- ===============================
         TOOL TERMINAL
    =============================== -->


    <div class="console-box" id="terminal">

        System Ready. Select an operational module above.

    </div>





    <!-- ===============================
         TOOL INPUT
    =============================== -->


    <div class="input-area">


        <input
            type="text"
            id="user-input"
            placeholder="Type parameters here..."
            onkeypress="handleKey(event)"
        >



        <button
            class="send-btn"
            onclick="sendInput()"
        >

            Submit

        </button>


    </div>


</div>
